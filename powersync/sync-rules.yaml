# PowerSync Sync Streams — MULTI-TENANT (production, all workspaces).
#
# Each connecting client receives ONLY the workspace(s) its logged-in user
# belongs to (workspace_members), scoped by auth.user_id() (the Supabase JWT
# sub). This mirrors the Supabase RLS membership check at the sync layer.
#
# Requires the source tables and workspace_members in the `powersync`
# publication. The bundled
# 20260710010000_powersync_publication_and_role_preflight migration creates and
# verifies that publication.
#
# PRIORITIES (0 = highest … 3 = lowest): the live board, reservations and
# service settings sync FIRST so a fresh device is usable in seconds, then the
# menu, then the big reference lists (733 wines), then the archive — so the
# planner/board never waits behind a full wine download. The client pairs this
# with whenSyncedPriority(1) to paint as soon as the priority-1 data is in.
#
# Demo is an ordinary sandbox workspace with its own test-account membership.
# There is no cross-restaurant account or authorization bypass.
#
# ⚠️ SECURITY-CRITICAL: verify with the dashboard's Sync Test tool (simulate a
# restaurant user → only its own rows) before any client reads from SQLite.
#
# Composite-key tables use workspace-qualified aliases. PowerSync's implicit id
# is global within a local table; a natural key by itself is only unique inside
# one workspace.

streams:
  services:
    priority: 1
    query: >-
      SELECT * FROM services
      WHERE workspace_id IN (SELECT workspace_id FROM workspace_members WHERE user_id = auth.user_id())
    auto_subscribe: true
  service_tables:
    priority: 1
    query: >-
      SELECT *, workspace_id || '|' || CAST(service_id AS TEXT) || '|' || CAST(table_id AS TEXT) AS id FROM service_tables
      WHERE workspace_id IN (SELECT workspace_id FROM workspace_members WHERE user_id = auth.user_id())
    auto_subscribe: true
  reservations:
    priority: 1
    query: >-
      SELECT * FROM reservations
      WHERE workspace_id IN (SELECT workspace_id FROM workspace_members WHERE user_id = auth.user_id())
    auto_subscribe: true
  service_settings:
    priority: 1
    query: >-
      SELECT workspace_id || '|' || id AS id, state, updated_at, workspace_id FROM service_settings
      WHERE workspace_id IN (SELECT workspace_id FROM workspace_members WHERE user_id = auth.user_id())
    auto_subscribe: true
  menu_courses:
    priority: 2
    query: >-
      SELECT *, workspace_id || '|' || CAST(position AS TEXT) AS id FROM menu_courses
      WHERE workspace_id IN (SELECT workspace_id FROM workspace_members WHERE user_id = auth.user_id())
    auto_subscribe: true
  beverages:
    priority: 2
    query: >-
      SELECT * FROM beverages
      WHERE workspace_id IN (SELECT workspace_id FROM workspace_members WHERE user_id = auth.user_id())
    auto_subscribe: true
  wines:
    priority: 3
    query: >-
      SELECT *, workspace_id || '|' || "key" AS id FROM wines
      WHERE workspace_id IN (SELECT workspace_id FROM workspace_members WHERE user_id = auth.user_id())
    auto_subscribe: true
  service_archive:
    priority: 3
    query: >-
      SELECT * FROM service_archive
      WHERE workspace_id IN (SELECT workspace_id FROM workspace_members WHERE user_id = auth.user_id())
    auto_subscribe: true

# Edition 3 = the current Sync Streams compiler (edition 2 was the alpha —
# the dashboard warns on it). Same stream structure; a superset SQL feature
# set. Bumped 22.07.2026 with the service-entity release deploy.
config:
  edition: 3
